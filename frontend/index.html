<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMR Atlas</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f0f2f5;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 1.25rem;
      color: #222;
    }

    input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      margin-bottom: 0.75rem;
      outline: none;
    }

    input:focus {
      border-color: #3a7bd5;
    }

    button {
      width: 100%;
      padding: 0.65rem;
      font-size: 1rem;
      background: #3a7bd5;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background: #2f66bb;
    }

    #response {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #444;
      min-height: 1.2rem;
    }

    #response.error {
      color: #c0392b;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Energy Demand Lookup</h1>
    <input type="text" id="cityInput" placeholder="Enter city name" />
    <button onclick="submitCity()">Submit</button>
    <div id="response"></div>
  </div>

  <script>
    async function submitCity() {
      const city = document.getElementById('cityInput').value.trim();
      const responseEl = document.getElementById('response');

      if (!city) {
        responseEl.textContent = 'Please enter a city name.';
        responseEl.className = 'error';
        return;
      }

      responseEl.textContent = 'Loading...';
      responseEl.className = '';

      try {
        const res = await fetch('http://localhost:5000/api/city', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ city }),
        });

        const data = await res.json();

        if (!res.ok) {
          responseEl.textContent = data.error || 'An error occurred.';
          responseEl.className = 'error';
        } else {
          responseEl.textContent = data.message;
          responseEl.className = '';
        }
      } catch {
        responseEl.textContent = 'Could not connect to the server.';
        responseEl.className = 'error';
      }
    }

    document.getElementById('cityInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitCity();
    });
  </script>
</body>
</html>
